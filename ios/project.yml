name: VocabApp
options:
  bundleIdPrefix: com.vocabapp
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: VocabApp/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  VocabApp:
    type: application
    platform: iOS
    sources:
      - path: VocabApp
        excludes:
          - "*.xcassets"
      - path: VocabApp/Assets.xcassets
        buildPhase: resources
      - path: VocabApp/web
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vocabapp.ios
        INFOPLIST_FILE: VocabApp/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: NO
